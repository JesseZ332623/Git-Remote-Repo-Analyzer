<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Git 仓库变更报告</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fc;
            color: #2d3748;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 32px 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 920px;
            margin: 0 auto;
        }
        .header {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 28px;
            margin-bottom: 40px;
        }
        .repo-header {
            font-size: 30px;
            font-weight: 700;
            color: #1e40af;
            letter-spacing: -0.02em;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .empty-icon {
            font-size: 78px;
            color: #15803d;
            margin-bottom: 28px;
        }
        .empty-title {
            font-size: 26px;
            font-weight: 700;
            color: #1e2937;
            margin-bottom: 16px;
        }
        .empty-desc {
            color: #475569;
            font-size: 16.5px;
            max-width: 460px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }
        footer {
            text-align: center;
            color: #94a3b8;
            margin-top: 80px;
            font-size: 13.5px;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 头部信息 -->
    <div class="header">
        <h1 class="repo-header" th:text="${repoName} + ' 变更报告'"></h1>
        <p style="color:#64748b; margin-top:8px; font-size:15px;">
            生成时间：<span th:text="${reportDate}"></span>
        </p>
    </div>

    <!-- 空状态卡片 -->
    <div class="card">
        <div class="empty-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="empty-title">暂无变更</div>
        <p class="empty-desc">
            本次扫描期间，远程仓库
            <strong th:text="${repoName}"></strong>
            的所有分支均无任何提交、文件变更或分支状态更新。
        </p>

        <div style="background-color: #f1f5f9; border-radius: 8px; padding: 16px 28px; display: inline-block;">
            <span style="color: #15803d; font-family: ui-monospace, monospace; font-weight: 500;">
                ✓ 仓库状态稳定
            </span>
        </div>
    </div>

    <footer>
        Git Remote Repo Listener
    </footer>
</div>
</body>
</html>
